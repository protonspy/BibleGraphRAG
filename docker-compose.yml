services:
  neo4j:
    image: neo4j:5.26
    container_name: biblegraphrag-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP — Neo4j Browser (http://localhost:7474)
      - "7687:7687"   # Bolt — driver endpoint (matches NEO4J_URI)
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  neo4j_data:
  neo4j_logs:
